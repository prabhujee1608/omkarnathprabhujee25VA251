<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Result Calculator</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      background:#f1f1f1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .container{
      width:700px;
      background:white;
      padding:40px;
      border-radius:20px;
      box-shadow:0 8px 20px rgba(109, 89, 89, 0.2);
      text-align:center;
    }

    h1{
      margin-bottom:30px;
      color:#111;
    }

    input{
      width:100%;
      padding:15px;
      margin-top:20px;
      font-size:22px;
      border:2px solid #444;
      border-radius:5px;
    }

    button{
      margin-top:30px;
      padding:15px 40px;
      background:navy;
      color:white;
      border:none;
      border-radius:10px;
      font-size:24px;
      cursor:pointer;
    }

    button:hover{
      background:darkblue;
    }

    #result{
      margin-top:30px;
      font-size:28px;
      color:green;
      font-weight:bold;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Student Result Calculator</h1>

    <input type="number" id="subjects"
           placeholder="Enter number of subjects">

    <button onclick="calculateResult()">
      Calculate Result
    </button>

    <div id="result"></div>

  </div>

  <script>

    function calculateResult(){

      let subjectCount =
      parseInt(document.getElementById("subjects").value);

      if(isNaN(subjectCount) || subjectCount <= 0){
        alert("Enter valid number of subjects");
        return;
      }

      let total = 0;

      for(let i=1; i<=subjectCount; i++){

        let marks =
        parseFloat(prompt(`Enter marks for Subject ${i}`));

        if(isNaN(marks) || marks < 0 || marks > 100){
          alert("Invalid marks entered");
          return;
        }

        total += marks;
      }

      let average = total / subjectCount;

      let grade = "";

      if(average >= 90){
        grade = "A+";
      }
      else if(average >= 75){
        grade = "A";
      }
      else if(average >= 60){
        grade = "B";
      }
      else if(average >= 40){
        grade = "C";
      }
      else{
        grade = "Fail";
      }

      document.getElementById("result").innerHTML = `
        Total Marks: ${total} <br>
        Average: ${average.toFixed(2)} <br>
        Grade: ${grade}
      `;
    }

  </script>

</body>
</html>
