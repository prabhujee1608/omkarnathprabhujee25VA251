<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Even / Odd</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #fafafa;
            color: #111;
        }

        .checker {
            text-align: center;
        }

        input {
            font-size: 24px;
            padding: 8px;
            border: none;
            border-bottom: 2px solid #ddd;
            background: transparent;
            text-align: center;
            width: 180px;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-bottom-color: #111;
        }

        /* Removes standard browser arrows on number inputs */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        #result {
            font-size: 16px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            font-weight: 500;
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="checker">
        <!-- The check triggers instantly as the user types -->
        <input type="number" id="num" placeholder="Type a number..." oninput="check()">
        <div id="result"></div>
    </div>

    <script>
        function check() {
            const val = document.getElementById('num').value;
            const res = document.getElementById('result');

            if (val === '') {
                res.innerText = '';
                return;
            }

            // Minimalist if-else condition
            if (parseInt(val) % 2 === 0) {
                res.innerText = 'Even';
            } else {
                res.innerText = 'Odd';
            }
        }
    </script>

</body>
</html>
